<script>
(() => {
    document.addEventListener('contextmenu', (event) => {
        event.preventDefault();
    }, { capture: true });

    document.addEventListener('keydown', (event) => {
        const key = event.key.toLowerCase();
        const modifier = event.ctrlKey || event.metaKey;
        const developerShortcut = modifier && event.shiftKey && ['i', 'j', 'c', 'k'].includes(key);
        const viewSourceShortcut = modifier && !event.shiftKey && key === 'u';
        const keyboardContextMenu = event.shiftKey && key === 'f10';

        if (key === 'f12' || developerShortcut || viewSourceShortcut || keyboardContextMenu) {
            event.preventDefault();
            event.stopImmediatePropagation();
        }
    }, { capture: true });
})();
</script>
