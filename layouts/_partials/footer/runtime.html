<time class="archive-runtime" datetime="2026-07-18T00:00:00+08:00" data-runtime-start="2026-07-18T00:00:00+08:00">本站已稳定运行 0天 0小时 0分 0秒</time>
<script>
(() => {
    const runtime = document.currentScript.previousElementSibling;
    const startedAt = new Date(runtime.dataset.runtimeStart).getTime();
    const updateRuntime = () => {
        const elapsed = Math.max(0, Date.now() - startedAt);
        const totalSeconds = Math.floor(elapsed / 1000);
        const days = Math.floor(totalSeconds / 86400);
        const hours = Math.floor(totalSeconds % 86400 / 3600);
        const minutes = Math.floor(totalSeconds % 3600 / 60);
        const seconds = totalSeconds % 60;
        runtime.textContent = `本站已稳定运行 ${days}天 ${hours}小时 ${minutes}分 ${seconds}秒`;
    };
    updateRuntime();
    window.setInterval(updateRuntime, 1000);
})();
</script>
